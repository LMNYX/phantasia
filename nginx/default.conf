# Default gateway
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    return 444;
}

# Frontend
server {
    listen 80;
    listen [::]:80;

    server_name uwu.local uwu.so staging.uwu.so;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://phantasia-frontend:3000/;
    }
}

# API
server {
    listen 80;
    listen [::]:80;

    server_name api.uwu.local api.uwu.so api.staging.uwu.so;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://phantasia-api:4444/;
    }
}
