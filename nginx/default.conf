# Default gateway
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    return 444;
}

# Frontend
server {
    listen 80;
    listen [::]:80;

    server_name uwu.local uwu.so www.uwu.so staging.uwu.so;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://phantasia-frontend:3000/;
    }
}

# API
server {
    listen 80;
    listen [::]:80;

    server_name api.uwu.local api.uwu.so api.staging.uwu.so;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://phantasia-api:4444/;
    }
}

# SeaweedFS S3 Gateway
server {
    listen 80;
    listen [::]:80;
    server_name i.uwu.local i.uwu.so i.staging.uwu.so;

    location / {
        proxy_pass http://seaweed-s3:8333/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Block all but GET and HEAD for security
        limit_except GET HEAD {
            deny all;
        }
    }
}