x-s3-data: &s3-defaults
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "REPLACETHISWITHSOMETHINGSECURE"
  MINIO_ENDPOINT: "http://minio:9000"
  S3_BUCKET_NAME: "phantasia"
  S3_DOMAIN: "i.uwu.local"

x-postgres-data: &postgres-defaults
  POSTGRES_HOST: "db"
  POSTGRES_USER: "phantasiauser"
  POSTGRES_PASSWORD: "REPLACETHISWITHSOMETHINGSECURE"
  POSTGRES_DB: "phantasia"

services:
  phantasia-frontend:
    # image:
    build: 
      context: frontend
      dockerfile: ./Dockerfile
    container_name: phantasia-frontend
    restart: unless-stopped
    depends_on:
      - phantasia-api
    
  phantasia-api:
    # image:
    build:
      context: api
      dockerfile: ./Dockerfile
    container_name: phantasia-api
    restart: unless-stopped
    depends_on:
      - db
      - minio
    environment:
      <<: 
        - *s3-defaults
        - *postgres-defaults

  db:
    image: postgres:16-alpine
    container_name: phantasia-db
    restart: always
    environment:
      <<:
        - *postgres-defaults
    volumes:
      - db:/var/lib/postgresql/data

  phantasia-nginx:
    image: nginx:1.29.0-alpine
    container_name: phantasia-nginx
    restart: always
    ports:
      - 80:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - phantasia-frontend
      - phantasia-api
      - minio
  minio:
    image: minio/minio
    container_name: phantasia-minio
    volumes:
      - minio_data:/data
    environment:
      <<:
        - *s3-defaults
    command: server /data


volumes:
  db:
  minio_data:

