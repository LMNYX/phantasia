services:
  phantasia-frontend:
    # image:
    build: 
      context: frontend
      dockerfile: ./Dockerfile
    container_name: phantasia-frontend
    restart: unless-stopped
    
  phantasia-api:
    # image:
    build:
      context: api
      dockerfile: ./Dockerfile
    container_name: phantasia-api
    restart: unless-stopped
  
  phantasia-nginx:
    image: nginx:1.29.0-alpine
    container_name: phantasia-nginx
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - phantasia-frontend
      - phantasia-api

volumes:
  db: